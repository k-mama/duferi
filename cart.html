<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUFERI - 장바구니</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 장바구니 액션 버튼 스타일 */
        .cart-actions { display: flex; justify-content: center; gap: 10px; }
        .cart-btn { padding: 16px 40px; font-size: 14px; font-weight: bold; text-align: center; cursor: pointer; text-decoration: none; transition: background-color 0.3s ease; }
        .btn-clear { background: #fff; color: #111; border: 1px solid #111; display: none; }
        .btn-continue { background: #111; color: #fff; border: 1px solid #111; }

        @media (max-width: 768px) {
            .cart-actions {
                flex-direction: column; /* 모바일에서 버튼을 위아래로 배치 */
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- 공통 헤더 삽입 영역 -->
    <div id="header-container"></div>

    <main class="reveal" style="max-width: 800px; margin: 100px auto; text-align: center; padding: 0 20px;">
        <h1 style="margin-bottom: 50px; font-weight: 300; letter-spacing: 2px;">CART</h1>
        <div id="cartMessage" style="padding: 100px 20px; background: #f9f9f9; border-top: 2px solid #111; border-bottom: 1px solid #ddd; color: #777; margin-bottom: 40px; font-size: 15px;">
            장바구니에 담긴 상품이 없습니다.
        </div>
        <div class="cart-actions">
            <button id="clearCartBtn" class="cart-btn btn-clear">장바구니 비우기</button>
            <a href="index.html" class="cart-btn btn-continue">쇼핑 계속하기</a>
        </div>
    </main>

    <!-- 공통 스크립트 -->
    <script src="common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var savedCount = localStorage.getItem('cartCount');
            var clearCartBtn = document.getElementById('clearCartBtn');
            var cartMessage = document.getElementById('cartMessage');

            if (savedCount && parseInt(savedCount, 10) > 0) { 
                if (cartMessage) { cartMessage.innerHTML = '<span style="color: #111; font-weight: bold;">총 ' + savedCount + '개</span>의 상품이 담겼습니다.'; }
                if (clearCartBtn) { clearCartBtn.style.display = 'inline-block'; }
            }

            if (clearCartBtn) {
                clearCartBtn.addEventListener('click', function() {
                    localStorage.removeItem('cartCount');
                    if (window.updateCartBadge) window.updateCartBadge();
                    if (cartMessage) { cartMessage.innerHTML = '장바구니에 담긴 상품이 없습니다.'; }
                    clearCartBtn.style.display = 'none';
                    if (window.showToast) window.showToast('장바구니가 비워졌습니다');
                });
            }
        });
    </script>
</body>
</html>

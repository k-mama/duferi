<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUFERI - 마이페이지</title>
    <link rel="stylesheet" href="common.css">
    <style>
        /* 추가된 마이페이지 스타일 */
        .profile-section { display: flex; align-items: center; justify-content: space-between; padding: 30px; background-color: #111; color: #fff; margin-bottom: 40px; text-align: left; }
        .profile-info h2 { font-size: 24px; font-weight: 300; margin-bottom: 10px; }
        .tier-badge { display: inline-block; padding: 5px 15px; background-color: #d4af37; color: #fff; font-size: 14px; font-weight: bold; letter-spacing: 1px; }
        .order-history { text-align: left; margin-top: 60px; margin-bottom: 40px; }
        .order-history h3 { font-size: 18px; font-weight: 500; margin-bottom: 20px; border-bottom: 2px solid #111; padding-bottom: 15px; }
        .order-table { width: 100%; border-collapse: collapse; text-align: center; font-size: 14px; }
        .order-table th { padding: 15px; border-bottom: 1px solid #ddd; background-color: #f9f9f9; font-weight: 500; }
        .order-table td { padding: 20px 15px; border-bottom: 1px solid #eee; color: #555; }
        .order-table td.product-col { text-align: left; color: #111; font-weight: 500; }

        @media (max-width: 768px) {
            .profile-section { flex-direction: column; gap: 20px; align-items: flex-start; }
            .order-table th, .order-table td { padding: 10px 5px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <!-- 공통 헤더 삽입 영역 -->
    <div id="header-container"></div>

    <main class="reveal" style="max-width: 800px; margin: 100px auto; text-align: center; padding: 0 20px;">
        <h1 style="margin-bottom: 50px; font-weight: 300; letter-spacing: 2px;">MY PAGE</h1>
        
        <!-- 프로필 영역 -->
        <div class="profile-section">
            <div class="profile-info">
                <h2>홍길동 님, 환영합니다.</h2>
                <p style="color: #aaa; font-size: 14px;">다음 등급(VIP)까지 150,000원 남았습니다.</p>
            </div>
            <div class="tier-badge">GOLD</div>
        </div>

        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 50px;">
            <div style="flex: 1; min-width: 200px; padding: 40px 20px; border: 1px solid #eaeaea; background-color: #fcfcfc;">
                <h3 style="font-size: 15px; font-weight: 500; margin-bottom: 15px; color: #555;">주문/배송 조회</h3>
                <p style="font-size: 28px; font-weight: bold; color: #d4af37;">0</p>
            </div>
            <div style="flex: 1; min-width: 200px; padding: 40px 20px; border: 1px solid #eaeaea; background-color: #fcfcfc;">
                <h3 style="font-size: 15px; font-weight: 500; margin-bottom: 15px; color: #555;">보유 포인트</h3>
                <p style="font-size: 28px; font-weight: bold; color: #d4af37;">1,500 <span style="font-size: 16px;">P</span></p>
            </div>
        </div>

        <!-- 최근 주문 내역 영역 -->
        <div class="order-history">
            <h3>최근 주문 내역</h3>
            <table class="order-table">
                <thead>
                    <tr>
                        <th>주문일자</th>
                        <th>상품정보</th>
                        <th>결제금액</th>
                        <th>상태</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>2023.10.25</td>
                        <td class="product-col">유스 래디언스 세럼 외 1건</td>
                        <td>193,000원</td>
                        <td style="color: #d4af37; font-weight: bold;">배송완료</td>
                    </tr>
                    <tr>
                        <td>2023.09.12</td>
                        <td class="product-col">하이드레이팅 에센스 워터</td>
                        <td>68,000원</td>
                        <td>구매확정</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <a href="index.html" style="color: #111; text-decoration: underline; font-size: 14px;">메인으로 돌아가기</a>
    </main>

    <!-- 공통 스크립트 -->
    <script src="common.js"></script>
</body>
</html>

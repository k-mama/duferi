<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUFERI - 로그인</title>
    <style>
        /* 기본 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; color: #333; line-height: 1.6; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* 헤더 및 네비게이션 스타일 (공통) */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 0 40px; height: 80px; border-bottom: 1px solid #eee; background-color: #fff; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
        .main-menu { display: flex; gap: 40px; }
        .main-menu li a { font-size: 15px; font-weight: 500; transition: color 0.3s ease; }
        .main-menu li a:hover { color: #d4af37; }
        .utility-menu { display: flex; gap: 20px; font-size: 13px; }

        /* 장바구니 배지 스타일 */
        .cart-badge { background-color: #d4af37; color: #fff; font-size: 11px; font-weight: bold; padding: 2px 6px; border-radius: 10px; margin-left: 5px; display: none; }
        .cart-badge.active { display: inline-block; }

        /* 토스트 팝업 스타일 */
        .toast-popup { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(40px); background-color: rgba(17, 17, 17, 0.9); color: #fff; padding: 15px 30px; border-radius: 5px; font-size: 15px; font-weight: 500; z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0.4s ease, transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        .toast-popup.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

        /* 스크롤 등장 애니메이션 */
        .reveal { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* --- 모바일 오프캔버스 메뉴 및 반응형 CSS --- */
        .mobile-menu-toggle { display: none; background: none; border: none; font-size: 28px; cursor: pointer; color: #333; min-height: 44px; padding: 0 10px; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: rgba(0,0,0,0.5); z-index: 999; opacity: 0; transition: opacity 0.3s ease; }
        .mobile-overlay.open { display: block; opacity: 1; }
        .mobile-drawer { position: fixed; top: 0; right: -100%; width: 75%; height: 100vh; background: #fff; z-index: 1000; transition: right 0.3s ease; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.1); }
        .mobile-drawer.open { right: 0; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #eee; }
        .drawer-logo { font-size: 20px; font-weight: bold; letter-spacing: 2px; }
        .drawer-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #333; padding: 5px; }
        .drawer-menu { display: flex; flex-direction: column; margin: 0; padding: 0; overflow-y: auto; }
        .drawer-menu li a { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #f5f5f5; font-size: 16px; font-weight: 500; }
        .drawer-menu li a .plus { font-size: 22px; font-weight: 300; color: #999; }
        img { max-width: 100%; height: auto; }

        @media (max-width: 768px) {
            .header nav { display: none; }
            .header { padding: 0 20px; }
            .mobile-menu-toggle { display: block; }
        }
    </style>
</head>
<body>
    <!-- 공통 헤더 삽입 영역 -->
    <div id="header-container"></div>

    <main class="reveal" style="max-width: 400px; margin: 100px auto; text-align: center; padding: 0 20px;">
        <h1 style="margin-bottom: 30px; font-weight: 300; letter-spacing: 2px;">LOGIN</h1>
        <form id="loginForm" action="index.html" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="userId" placeholder="아이디를 입력해주세요" style="padding: 15px; border: 1px solid #ccc; font-size: 14px; outline: none;">
            <div style="position: relative; display: flex;">
                <input type="password" id="userPw" placeholder="비밀번호를 입력해주세요" style="padding: 15px; padding-right: 45px; border: 1px solid #ccc; font-size: 14px; outline: none; width: 100%;">
                <button type="button" id="togglePwBtn" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #666;">👁️</button>
            </div>
            <button type="submit" style="padding: 16px; background: #111; color: #fff; border: none; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 10px;">로그인</button>
        </form>
        <div style="margin-top: 20px; font-size: 13px;">
            <a href="#" style="color: #666; text-decoration: none; margin-right: 10px;">회원가입</a> | 
            <a href="#" style="color: #666; text-decoration: none; margin-left: 10px;">아이디/비밀번호 찾기</a>
        </div>
        <div style="margin-top: 50px;">
            <a href="index.html" style="color: #111; text-decoration: underline; font-size: 14px;">메인으로 돌아가기</a>
        </div>
    </main>

    <!-- 모바일 메뉴 오버레이 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- 모바일 사이드 드로어 -->
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-header">
            <div class="drawer-logo">DUFERI</div>
            <button class="drawer-close" id="drawerClose">✕</button>
        </div>
        <ul class="drawer-menu">
            <li><a href="brand-story.html">DUFERI STORY <span class="plus">+</span></a></li>
            <li><a href="homme.html">HOMME <span class="plus">+</span></a></li>
            <li><a href="skincare.html">SKINCARE <span class="plus">+</span></a></li>
            <li><a href="makeup.html">MAKEUP <span class="plus">+</span></a></li>
            <li><a href="new-best.html">NEW & BEST <span class="plus">+</span></a></li>
        </ul>
    </div>

    <!-- 토스트 팝업 -->
    <div id="toastPopup" class="toast-popup">알림 메시지</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.querySelector('.mobile-menu-toggle');
            var closeBtn = document.getElementById('drawerClose');
            var drawer = document.getElementById('mobileDrawer');
            var overlay = document.getElementById('mobileOverlay');

            function openDrawer() {
                if(drawer && overlay) {
                    drawer.classList.add('open');
                    overlay.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
            }

            function closeDrawer() {
                if(drawer && overlay) {
                    drawer.classList.remove('open');
                    overlay.classList.remove('open');
                    document.body.style.overflow = '';
                }
            }

            if(toggleBtn) toggleBtn.addEventListener('click', openDrawer);
            if(closeBtn) closeBtn.addEventListener('click', closeDrawer);
            if(overlay) overlay.addEventListener('click', closeDrawer);

            // 로그인 폼 검증
            var loginForm = document.getElementById('loginForm');
            if(loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    var id = document.getElementById('userId').value.trim();
                    var pw = document.getElementById('userPw').value.trim();
                    if (!id || !pw) {
                        e.preventDefault();
                        alert('정보를 입력해주세요');
                    }
                });
            }

            // 비밀번호 표시/숨기기 토글 기능
            var togglePwBtn = document.getElementById('togglePwBtn');
            var userPwInput = document.getElementById('userPw');
            if(togglePwBtn && userPwInput) {
                togglePwBtn.addEventListener('click', function() {
                    var type = userPwInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    userPwInput.setAttribute('type', type);
                    this.textContent = type === 'password' ? '👁️' : '🙈';
                });
            }

            // 장바구니 배지 동기화
            var cartBadge = document.getElementById('cartBadge'), savedCount = localStorage.getItem('cartCount');
            if (savedCount && parseInt(savedCount, 10) > 0 && cartBadge) { cartBadge.textContent = savedCount; cartBadge.classList.add('active'); }

            // 전역 토스트 팝업 함수
            var toastTimeout;
            window.showToast = function(message) {
                var toast = document.getElementById('toastPopup');
                if (toast) {
                    if (message) toast.textContent = message;
                    toast.classList.add('show');
                    clearTimeout(toastTimeout);
                    toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
                }
            };

            // 스크롤 등장 애니메이션 (Intersection Observer)
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUFERI - 로그인</title>
    <link rel="stylesheet" href="common.css">
</head>
<body>
    <!-- 공통 헤더 삽입 영역 -->
    <div id="header-container"></div>

    <main class="reveal" style="max-width: 400px; margin: 100px auto; text-align: center; padding: 0 20px;">
        <h1 style="margin-bottom: 30px; font-weight: 300; letter-spacing: 2px;">LOGIN</h1>
        <form id="loginForm" action="index.html" style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="userId" placeholder="아이디를 입력해주세요" style="padding: 15px; border: 1px solid #ccc; font-size: 14px; outline: none;">
            <div style="position: relative; display: flex;">
                <input type="password" id="userPw" placeholder="비밀번호를 입력해주세요" style="padding: 15px; padding-right: 45px; border: 1px solid #ccc; font-size: 14px; outline: none; width: 100%;">
                <button type="button" id="togglePwBtn" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #666;">👁️</button>
            </div>
            <button type="submit" style="padding: 16px; background: #111; color: #fff; border: none; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 10px;">로그인</button>
        </form>
        <div style="margin-top: 20px; font-size: 13px;">
            <a href="#" style="color: #666; text-decoration: none; margin-right: 10px;">회원가입</a> | 
            <a href="#" style="color: #666; text-decoration: none; margin-left: 10px;">아이디/비밀번호 찾기</a>
        </div>
        <div style="margin-top: 50px;">
            <a href="index.html" style="color: #111; text-decoration: underline; font-size: 14px;">메인으로 돌아가기</a>
        </div>
    </main>

    <!-- 모바일 메뉴 오버레이 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- 모바일 사이드 드로어 -->
    <div class="mobile-drawer" id="mobileDrawer">
        <div class="drawer-header">
            <div class="drawer-logo">DUFERI</div>
            <button class="drawer-close" id="drawerClose">✕</button>
        </div>
        <ul class="drawer-menu">
            <li><a href="brand-story.html">DUFERI STORY <span class="plus">+</span></a></li>
            <li><a href="homme.html">HOMME <span class="plus">+</span></a></li>
            <li><a href="skincare.html">SKINCARE <span class="plus">+</span></a></li>
            <li><a href="makeup.html">MAKEUP <span class="plus">+</span></a></li>
            <li><a href="new-best.html">NEW & BEST <span class="plus">+</span></a></li>
        </ul>
    </div>

    <!-- 토스트 팝업 -->
    <div id="toastPopup" class="toast-popup">알림 메시지</div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var toggleBtn = document.querySelector('.mobile-menu-toggle');
            var closeBtn = document.getElementById('drawerClose');
            var drawer = document.getElementById('mobileDrawer');
            var overlay = document.getElementById('mobileOverlay');

            function openDrawer() {
                if(drawer && overlay) {
                    drawer.classList.add('open');
                    overlay.classList.add('open');
                    document.body.style.overflow = 'hidden';
                }
            }

            function closeDrawer() {
                if(drawer && overlay) {
                    drawer.classList.remove('open');
                    overlay.classList.remove('open');
                    document.body.style.overflow = '';
                }
            }

            if(toggleBtn) toggleBtn.addEventListener('click', openDrawer);
            if(closeBtn) closeBtn.addEventListener('click', closeDrawer);
            if(overlay) overlay.addEventListener('click', closeDrawer);

            // 로그인 폼 검증
            var loginForm = document.getElementById('loginForm');
            if(loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    var id = document.getElementById('userId').value.trim();
                    var pw = document.getElementById('userPw').value.trim();
                    if (!id || !pw) {
                        e.preventDefault();
                        alert('정보를 입력해주세요');
                    }
                });
            }

            // 비밀번호 표시/숨기기 토글 기능
            var togglePwBtn = document.getElementById('togglePwBtn');
            var userPwInput = document.getElementById('userPw');
            if(togglePwBtn && userPwInput) {
                togglePwBtn.addEventListener('click', function() {
                    var type = userPwInput.getAttribute('type') === 'password' ? 'text' : 'password';
                    userPwInput.setAttribute('type', type);
                    this.textContent = type === 'password' ? '👁️' : '🙈';
                });
            }

            // 장바구니 배지 동기화
            var cartBadge = document.getElementById('cartBadge'), savedCount = localStorage.getItem('cartCount');
            if (savedCount && parseInt(savedCount, 10) > 0 && cartBadge) { cartBadge.textContent = savedCount; cartBadge.classList.add('active'); }

            // 전역 토스트 팝업 함수
            var toastTimeout;
            window.showToast = function(message) {
                var toast = document.getElementById('toastPopup');
                if (toast) {
                    if (message) toast.textContent = message;
                    toast.classList.add('show');
                    clearTimeout(toastTimeout);
                    toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 3000);
                }
            };

            // 스크롤 등장 애니메이션 (Intersection Observer)
            var observer = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(function(el) { observer.observe(el); });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUFERI OFFICIAL</title>
    <style>
        /* 럭셔리 미니멀리즘 베이스 세팅 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #000000;
            color: #ffffff;
            font-family: "Apple SD Gothic Neo", "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* [루이비통 스타일] 커서 호버 시 배경 및 컬러 반전 마스터 헤더 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            background-color: transparent; 
            color: #ffffff; 
            transition: background-color 0.35s cubic-bezier(0.25, 1, 0.5, 1), 
                        color 0.35s cubic-bezier(0.25, 1, 0.5, 1),
                        border-color 0.35s ease;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 마우스를 올렸을 때 솔리드 화이트 & 다크 반전 */
        header:hover {
            background-color: #ffffff; 
            color: #111111; 
            border-bottom: 1px solid #e5e5e5;
        }

        /* 헤더 상단 1열 와이드 레이아웃 */
        .header-main-line {
            width: 100%;
            padding: 25px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 좌측: 메뉴 & 검색 */
        .header-left-zone {
            display: flex;
            align-items: center;
            gap: 25px;
            flex: 1;
        }

        .icon-text-btn {
            background: none;
            border: none;
            color: inherit; 
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.9;
        }

        .header-left-zone svg, .header-right-zone svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor; 
            stroke-width: 1.5;
        }

        /* 중앙: 극도로 가늘고 섬세한 오리지널 타이포그래피 */
        .header-center-zone {
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .header-center-zone a {
            font-size: 30px; 
            font-weight: 200; 
            text-transform: uppercase;
            letter-spacing: 0.5em; 
            color: inherit; 
            text-decoration: none;
            text-indent: 0.5em; 
        }

        /* 우측: 유틸리티 아이콘 팩 */
        .header-right-zone {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 22px;
            flex: 1;
        }

        .client-service-text {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.05em;
            margin-right: 5px;
        }

        .utility-icon-link {
            color: inherit;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            position: relative;
        }

        /* 쇼핑백 가방 우측 상단 숫자 배지 '0' */
        .cart-badge {
            position: absolute;
            top: -2px;
            right: -4px;
            background-color: #111111; 
            color: #ffffff;
            font-size: 9px;
            font-weight: 600;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        header:hover .cart-badge {
            background-color: #000000;
            color: #ffffff;
        }

        /* 다국어 드롭다운 메뉴 스타일 */
        .lang-selector-container {
            position: relative;
        }
        .lang-dropdown-menu {
            display: none;
            position: absolute;
            top: 150%;
            right: 0;
            background-color: #111111;
            border: 1px solid #222222;
            min-width: 150px;
            list-style: none;
            padding: 10px 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        header:hover .lang-dropdown-menu {
            background-color: #ffffff;
            border: 1px solid #e5e5e5;
        }
        .lang-dropdown-menu.show { display: block; }
        .lang-dropdown-menu li a {
            display: block;
            padding: 10px 20px;
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 0.08em;
            opacity: 0.6;
        }
        header:hover .lang-dropdown-menu li a { color: #111111; }
        .lang-dropdown-menu li a:hover { opacity: 1; background-color: rgba(255,255,255,0.1); }
        header:hover .lang-dropdown-menu li a:hover { background-color: #f5f5f5; }

        /* ==========================================================
           [원상 복구 및 교정] 대문 페이지 전용 럭셔리 카테고리 메뉴 바
           ========================================================== */
        .header-sub-menu-line {
            width: 100%;
            padding-bottom: 18px;
            display: flex;
            justify-content: center;
        }

        .header-sub-menu-line ul {
            display: flex;
            list-style: none;
            gap: 50px;
        }

        .header-sub-menu-line ul li a {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.12em;
            color: inherit;
            text-decoration: none;
            transition: opacity 0.3s;
            opacity: 0.75;
        }
        .header-sub-menu-line ul li a:hover {
            opacity: 1;
        }

        /* 런칭 집중 무드를 위한 미출시 카테고리 은은한 제어 */
        .sub-nav-muted {
            opacity: 0.3 !important;
            cursor: default;
            pointer-events: none;
        }

        /* 가로 폭에 맞춰 무한 재생되는 웅장한 시네마틱 비디오 섹션 */
        .video-hero-viewport {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background-color: #000000;
        }

        .cinematic-stream {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .hero-video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        .video-text-container {
            position: absolute;
            bottom: 100px; 
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            text-align: center;
            width: 100%;
            padding: 0 20px;
        }

        .brand-statement-sub {
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 12px;
            opacity: 0.9;
        }

        .brand-statement-main {
            font-size: 42px;
            font-weight: 200; 
            letter-spacing: 0.15em;
            text-transform: uppercase;
            line-height: 1.3;
            color: #ffffff;
            margin-bottom: 35px;
        }

        .gateway-action-row {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .gateway-btn {
            font-size: 13px;
            font-weight: 500;
            color: #ffffff;
            text-decoration: none;
            border-bottom: 1px solid #ffffff;
            padding-bottom: 4px;
            letter-spacing: 0.05em;
            transition: opacity 0.2s;
        }
        .gateway-btn:hover { opacity: 0.7; }

        /* 반응형 모바일 대응 */
        @media (max-width: 992px) {
            .client-service-text { display: none; }
            .header-sub-menu-line ul { gap: 30px; }
        }

        @media (max-width: 768px) {
            .header-main-line { padding: 20px; }
            .header-center-zone a { font-size: 24px; }
            .icon-text-btn span { display: none; }
            .header-sub-menu-line { display: none; } 
            .brand-statement-main { font-size: 26px; }
            .gateway-action-row { flex-direction: column; gap: 15px; align-items: center; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-main-line">
            <div class="header-left-zone">
                <button class="icon-text-btn" aria-label="메뉴">
                    <svg viewBox="0 0 24 24">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                    <span>메뉴</span>
                </button>
                <button class="icon-text-btn" aria-label="검색">
                    <svg viewBox="0 0 24 24">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <span>검색</span>
                </button>
            </div>

            <div class="header-center-zone">
                <a href="./index.html">DUFERI</a>
            </div>

            <div class="header-right-zone">
                <span class="client-service-text">클라이언트 서비스</span>
                <a href="#" class="utility-icon-link" aria-label="위시리스트">
                    <svg viewBox="0 0 24 24">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </a>
                <a href="#" class="utility-icon-link" aria-label="마이페이지">
                    <svg viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
                <a href="#" class="utility-icon-link" aria-label="쇼핑백">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <span class="cart-badge">0</span>
                </a>
                
                <div class="lang-selector-container">
                    <button class="utility-icon-link" style="background:none; border:none; cursor:pointer;" onclick="toggleLangDropdown(event)" aria-label="언어 변경">
                        <svg viewBox="0 0 24 24">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M2 12h20"></path>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
                        </svg>
                    </button>
                    <ul class="lang-dropdown-menu" id="langDropdown">
                        <li><a href="./index.html">KR (대한민국)</a></li>
                        <li><a href="./en/index.html">EN (International)</a></li>
                        <li><a href="./ja/index.html">JA (日本)</a></li>
                        <li><a href="./zh/index.html">ZH (中国)</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="header-sub-menu-line">
            <ul>
                <li><a href="./ko/brand-story.html">듀페리 스토리</a></li>
                <li><a href="./ko/homme.html">옴므</a></li>
                <li><a href="#" class="sub-nav-muted">스킨케어</a></li>
                <li><a href="#" class="sub-nav-muted">오브제</a></li>
                <li><a href="#" class="sub-nav-muted">기프트</a></li>
            </ul>
        </div>
    </header>

    <section class="video-hero-viewport">
        <video class="cinematic-stream" autoplay muted loop playsinline>
            <source src="video/u6958272478_glossy_black_Audi_luxury_sedan_front_three-quarte_dd8c59aa-8cff-464a-a1d6-2fb64ba83f69_0.mp4" type="video/mp4">
        </video>
        <div class="hero-video-overlay"></div>

        <div class="video-text-container">
            <p class="brand-statement-sub">The New Prelude</p>
            <h1 class="brand-statement-main">BORN RARE 컬렉션 공개</h1>
            <div class="gateway-action-row">
                <a href="./ko/index.html" class="gateway-btn">한국어 스토어 입장</a>
                <a href="./en/index.html" class="gateway-btn">ENTER GLOBAL SITE</a>
            </div>
        </div>
    </section>

    <script>
        function toggleLangDropdown(event) {
            event.stopPropagation(); 
            const dropdown = document.getElementById('langDropdown');
            dropdown.classList.toggle('show');
        }

        window.addEventListener('click', function() {
            const dropdown = document.getElementById('langDropdown');
            if (dropdown && dropdown.classList.contains('show')) {
                dropdown.classList.remove('show');
            }
        });
    </script>
</body>
</html>
